name: Test the application
on:
  workflow_call:
  pull_request:
    paths-ignore:
      - .devcontainer/**
      - .github/**
      - '**.gitattributes'
      - '**.gitignore'
      - .gitmodules
      - Dockerfile
      - entrypoint.sh
      - httpd.template.conf
      - '**.md'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install deps
        run: npm install
      
      - name: Perform tests
        run: npm test
